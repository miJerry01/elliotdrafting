<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Basemap + Lat/Lon + KMZ + Markups</title>

  <link
    rel="stylesheet"
    href="https://js.arcgis.com/3.46/dijit/themes/claro/claro.css"
  />
  <link
    rel="stylesheet"
    href="https://js.arcgis.com/3.46/esri/css/esri.css"
  />

  <link rel="stylesheet" href="../style/app.css" />

  <script src="https://js.arcgis.com/3.46/"></script>
</head>

<body class="claro">
  <div
    data-dojo-type="dijit/layout/BorderContainer"
    data-dojo-props="design:'headline', gutters:false"
    class="app-shell"
  >
<div
  id="map"
  data-dojo-type="dijit/layout/ContentPane"
  data-dojo-props="region:'center'"
>
  <!-- HOME BUTTON -->
  <div class="floating-panel floating-panel--home">
    <a href="../index.html" class="home-link">HOME</a>
  </div>

  <!-- BASEMAP -->
  <div class="floating-panel floating-panel--basemap">
    <div
      data-dojo-type="dijit/TitlePane"
      data-dojo-props="title:'Switch Basemap', open:false"
    >
      <div
        data-dojo-type="dijit/layout/ContentPane"
        class="panel panel--gallery"
      >
        <div id="basemapGallery"></div>
      </div>
    </div>
  </div>

  <!-- LAT / LON -->
  <div class="floating-panel floating-panel--latlon">
    <div
      data-dojo-type="dijit/TitlePane"
      data-dojo-props="title:'Go to Lat/Long', open:false"
    >
      <div
        data-dojo-type="dijit/layout/ContentPane"
        class="panel panel--standard"
      >
        <div class="input-row">
          <input id="latlon-input" type="text" />
          <button id="latlon-go" type="button">Go</button>
        </div>
        <div id="latlon-error" class="error"></div>
      </div>
    </div>
  </div>

  <!-- MARKUPS -->
  <div class="floating-panel floating-panel--markups">
    <div
      data-dojo-type="dijit/TitlePane"
      data-dojo-props="title:'Markups', open:false"
    >
      <div
        data-dojo-type="dijit/layout/ContentPane"
        class="panel panel--standard"
      >
        <div class="button-row">
          <button id="mk-pin" type="button">Pin</button>
          <button id="mk-line" type="button">Line</button>
          <button id="mk-clear" type="button">Clear Markups</button>
        </div>

        <div class="hint">
          Draw KMZ lines on Map and use the Pin and line to mark your
          drawing. Pin: click to drop a dot. Line: click to start, click to
          add vertices, <b>double-click</b> to finish.
        </div>
      </div>
    </div>
  </div>

  <!-- KMZ -->
  <div class="floating-panel floating-panel--kmz">
    <div
      data-dojo-type="dijit/TitlePane"
      data-dojo-props="title:'KMZ Layers', open:false"
    >
      <div
        data-dojo-type="dijit/layout/ContentPane"
        class="panel panel--wide"
      >
        <div class="input-row">
          <input
            id="kmz-url"
            type="text"
            placeholder="KMZ/KML URL or relative path"
          />
          <button id="kmz-add" type="button">Add KMZ</button>
        </div>

        <div class="hint">
          Or hard-code your KMZ load with
          <code>addKMZ('kmz/your.kmz')</code>.
        </div>

        <div id="kmz-error" class="error"></div>
        <div id="kmz-list" class="kmz-list"></div>
      </div>
    </div>
  </div>
</div>
  </div>

  <script src="../services/mapCal.js"></script>
</body>
</html>

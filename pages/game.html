<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Pac-Man (dat Dude)</title>
  <link rel="stylesheet" href="../style/game.css" />
</head>
<body>

  <nav class="home-link" id="nav-back" role="navigation">
    <a href="../index.html">home</a>
  </nav>

  <div class="game-wrap">
    <div
      id="score"
      class="pause-trigger"
      role="button"
      tabindex="0"
      aria-label="Pause or resume game"
      title="Tap or click score to pause"
    >
      Score: 0
    </div>

    <div id="lives">Lives: 10</div>
    <canvas id="game"></canvas>
  </div>

  <div id="message">Tap Score to pause on mobile, swipe to move, or press P on desktop</div>

  <section class="high-scores-wrap" aria-labelledby="high-scores-title">
    <h2 id="high-scores-title">Top 5 High Scores</h2>
    <ol id="high-scores-list"></ol>
  </section>

  <script src="../services/pacman.js"></script>
</body>
</html>
